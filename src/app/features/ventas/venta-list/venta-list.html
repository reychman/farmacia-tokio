<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold text-warning mb-0">
        <i class="bi bi-clock-history me-2"></i>Historial de Ventas
    </h2>
    <a routerLink="/ventas/nueva" class="btn btn-success">
        <i class="bi bi-plus-circle me-1"></i>Nueva Venta
    </a>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
        <thead class="table-warning">
            <tr>
            <th>#</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Método de pago</th>
            <th>Observación</th>
            <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let v of ventas; let i = index">
            <td class="text-muted">{{ v.id }}</td>
            <td>{{ formatFecha(v.fecha) }}</td>
            <td class="fw-bold text-success">Bs. {{ v.total.toFixed(2) }}</td>
            <td>
                <span class="badge"
                [class.bg-success]="v.metodoPago === 'efectivo'"
                [class.bg-info]="v.metodoPago === 'qr'"
                [class.bg-primary]="v.metodoPago === 'transferencia'">
                <i class="bi bi-cash me-1" *ngIf="v.metodoPago === 'efectivo'"></i>
                <i class="bi bi-qr-code me-1" *ngIf="v.metodoPago === 'qr'"></i>
                <i class="bi bi-bank me-1" *ngIf="v.metodoPago === 'transferencia'"></i>
                {{ v.metodoPago }}
                </span>
            </td>
            <td class="text-muted">{{ v.observacion || '—' }}</td>
            <td>
                <a [routerLink]="['/ventas/detalle', v.id]" class="btn btn-sm btn-outline-primary me-1">
                <i class="bi bi-eye"></i>
                </a>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminar(v.id!)">
                <i class="bi bi-trash"></i>
                </button>
            </td>
            </tr>
            <tr *ngIf="ventas.length === 0">
            <td colspan="6" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                No hay ventas registradas
            </td>
            </tr>
        </tbody>
        </table>
    </div>
</div>
