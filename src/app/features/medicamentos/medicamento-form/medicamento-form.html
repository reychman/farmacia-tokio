<div class="card border-primary">
    <div class="card-header bg-primary text-white fw-semibold">
        <i class="bi bi-capsule me-2"></i>
        {{ esEdicion ? 'Editar Medicamento' : 'Nuevo Medicamento' }}
    </div>
    <div class="card-body">
        <div class="row g-3">

        <div class="col-md-6">
            <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="nombre" [(ngModel)]="form.nombre"
            placeholder="Ej: Paracetamol 500mg">
        </div>

        <div class="col-md-6">
            <label class="form-label fw-semibold">Laboratorio <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="laboratorio" [(ngModel)]="form.laboratorio"
            placeholder="Ej: Laboratorios Inti">
        </div>

        <div class="col-md-4">
            <label class="form-label fw-semibold">Precio (Bs.)</label>
            <input type="number" class="form-control" name="precio" [(ngModel)]="form.precio"
            min="0" step="0.50" placeholder="0.00">
        </div>

        <div class="col-md-4">
            <label class="form-label fw-semibold">Stock</label>
            <input type="number" class="form-control" name="stock" [(ngModel)]="form.stock" min="0" placeholder="0">
        </div>

        <div class="col-md-4">
            <label class="form-label fw-semibold">Unidad</label>
            <select class="form-select" name="unidad" [(ngModel)]="form.unidad">
            <option value="caja">Caja</option>
            <option value="frasco">Frasco</option>
            <option value="blister">Blíster</option>
            <option value="ampolla">Ampolla</option>
            <option value="unidad">Unidad</option>
            <option value="sobre">Sobre</option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label fw-semibold">Fecha de vencimiento</label>
            <input type="date" class="form-control" name="fechaVencimiento" [(ngModel)]="form.fechaVencimiento">
        </div>

        <div class="col-md-6">
            <label class="form-label fw-semibold">Descripción</label>
            <input type="text" class="form-control" name="descripcion" [(ngModel)]="form.descripcion"
            placeholder="Indicaciones o presentación">
        </div>

        </div>
    </div>
    <div class="card-footer d-flex gap-2 justify-content-end">
        <button class="btn btn-outline-secondary" (click)="cancelar()">
        <i class="bi bi-x-circle me-1"></i>Cancelar
        </button>
        <button class="btn btn-primary" (click)="guardar()">
        <i class="bi bi-floppy me-1"></i>
        {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
    </div>
</div>
